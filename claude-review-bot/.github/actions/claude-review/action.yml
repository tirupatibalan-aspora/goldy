name: 'Aspora Code Review Bot'
description: 'Personalized code review using Claude AI — learns from Reviewer A (iOS) & Reviewer B (Android) PR feedback'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key for Claude access'
    required: true
  github_token:
    description: 'GitHub token for PR interaction'
    required: true
  platform:
    description: 'Target platform (ios or android) — auto-detected from diff if not set'
    required: false
    default: 'android'
  pr_number:
    description: 'Pull request number'
    required: false

outputs:
  verdict:
    description: 'Review verdict (APPROVE, CHANGES_REQUESTED, or COMMENT)'
  score:
    description: 'Confidence score out of 10'
  critical_count:
    description: 'Number of critical issues found'
  major_count:
    description: 'Number of major issues found'

runs:
  using: 'node20'
  main: 'index.js'
