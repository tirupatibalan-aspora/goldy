name: Harvest PR Review Learnings

# Runs after a PR is closed (merged) to extract new patterns from reviewer comments
on:
  pull_request:
    types: [closed]

jobs:
  harvest:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd .github/actions/claude-review && npm install

      - name: Detect platform and reviewer
        id: detect
        run: |
          if [[ "${{ github.repository }}" == *"ios"* ]]; then
            echo "platform=ios" >> $GITHUB_OUTPUT
            echo "reviewer=ReviewerA" >> $GITHUB_OUTPUT
          else
            echo "platform=android" >> $GITHUB_OUTPUT
            echo "reviewer=ReviewerB" >> $GITHUB_OUTPUT
          fi

      - name: Harvest PR comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/harvest-pr-comments.js \
            --repo ${{ github.repository }} \
            --pr ${{ github.event.pull_request.number }} \
            --reviewer ${{ steps.detect.outputs.reviewer }} \
            --platform ${{ steps.detect.outputs.platform }}

      - name: Commit updated learnings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/actions/claude-review/learnings/
          if git diff --staged --quiet; then
            echo "No learnings changes to commit"
          else
            git commit -m "chore: harvest review learnings from PR #${{ github.event.pull_request.number }}"
            git push
          fi
