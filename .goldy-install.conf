# Goldy install config — customize per project
# Edit this file to configure how installation links appear in reports.
# Each platform has: channel/link, version info, and step-by-step instructions.

# ── Android ──────────────────────────────────────────────────
INSTALL_ANDROID_CHANNEL="#android-apk"
INSTALL_ANDROID_CHANNEL_ID="C0XXXXXXX"
INSTALL_ANDROID_BRANCH_KEYWORD="gold"
INSTALL_ANDROID_STEPS="1. Join #android-apk channel in Slack
2. Find the latest build for your gold branch (e.g. feature/wealth-module-gold-*)
3. Download the APK from the posted link
4. On your device: Settings → Install unknown apps → enable for your browser
5. Open the downloaded APK → Install"

# ── iOS ──────────────────────────────────────────────────────
INSTALL_IOS_METHOD="testflight"
INSTALL_IOS_VERSION="11.0.0"
INSTALL_IOS_BUNDLE_ID="tech.vance.app.stage"
INSTALL_IOS_STEPS="1. Install TestFlight from the App Store (if not already installed)
2. Open TestFlight → find Aspora (Stage)
3. Look for version 11.0.0 (latest build number)
4. Tap Install / Update
5. Open the app → navigate to Gold tab"

# ── Custom (add your own platform) ───────────────────────────
# INSTALL_WEB_URL="https://staging.aspora.com"
# INSTALL_WEB_STEPS="1. Open the URL in Chrome\n2. Login with test credentials"
